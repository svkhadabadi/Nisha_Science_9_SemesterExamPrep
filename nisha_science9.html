let fcCh=0,fcIdx=0,fcFlipped=false;
let pqCh=0, saCh=0, sumCh=0;
let answered={},correct=0,total=0;
let saRevealed={};

function init(){
  ['fc','pq','sa','sum'].forEach(p=>{
    const nav=document.getElementById(p+'-nav');
    if(!nav) return;
    nav.innerHTML=DATA.map((ch,i)=>`
      <button class="ch-btn" id="${p}-btn-${i}"
        style="color:${ch.dark};background:${ch.light};border-color:${ch.color}"
        onclick="sel('${p}',${i})">${ch.emoji} ${ch.short}</button>
    `).join('');
  });
  selFc(0); selPq(0); selSa(0); selSum(0);
}

function sel(p,i){
  if(p==='fc') selFc(i);
  else if(p==='pq') selPq(i);
  else if(p==='sa') selSa(i);
  else selSum(i);
}

function activateBtn(p,i){
  DATA.forEach((_,j)=>{
    const b=document.getElementById(p+'-btn-'+j);
    if(!b) return;
    const ch=DATA[j];
    if(j===i){b.style.background=ch.color;b.style.color='#fff';b.style.borderColor=ch.dark;b.style.transform='scale(1.08)';}
    else{b.style.background=ch.light;b.style.color=ch.dark;b.style.borderColor=ch.color;b.style.transform='scale(1)';}
  });
}

function switchTab(t,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  btn.classList.add('active');
}

function selFc(i){fcCh=i;fcIdx=0;fcFlipped=false;activateBtn('fc',i);renderFc();}
function renderFc(){
  const ch=DATA[fcCh],cards=ch.cards,c=cards[fcIdx];
  document.getElementById('fc-ch-title').innerHTML=`<span class="ch-badge" style="background:${ch.light};color:${ch.dark}">${ch.emoji} Ch ${ch.id}</span> ${ch.title}`;
  document.getElementById('fc-prog').style.width=((fcIdx+1)/cards.length*100)+'%';
  document.getElementById('fc-counter').textContent=(fcIdx+1)+' / '+cards.length;
  const card=document.getElementById('fc-card');
  card.classList.remove('flipped'); fcFlipped=false;
  document.getElementById('fc-emoji').textContent=ch.emoji;
  document.getElementById('fc-term').textContent=c.t;
  document.getElementById('fc-def').textContent=c.d;
  document.getElementById('fc-back').style.background=ch.grad;
  card.classList.add('pop'); setTimeout(()=>card.classList.remove('pop'),400);
}
function flipCard(){fcFlipped=!fcFlipped;document.getElementById('fc-card').classList.toggle('flipped',fcFlipped);}
function nextCard(){fcIdx=(fcIdx+1)%DATA[fcCh].cards.length;renderFc();}
function prevCard(){fcIdx=(fcIdx-1+DATA[fcCh].cards.length)%DATA[fcCh].cards.length;renderFc();}
function rateCard(r){
  const back=document.getElementById('fc-back');
  back.style.background=r>=3?'linear-gradient(135deg,#1DD1A1,#48DBFB)':'linear-gradient(135deg,#FF6B6B,#FF9F43)';
  setTimeout(nextCard,500);
}

function selPq(i){pqCh=i;activateBtn('pq',i);renderPq();}
function renderPq(){
  const ch=DATA[pqCh];
  let html=`<div class="ch-title"><span class="ch-badge" style="background:${ch.light};color:${ch.dark}">${ch.emoji} Ch ${ch.id}</span> ${ch.title}</div>`;
  ch.qs.forEach((q,qi)=>{
    const key=pqCh+'_'+qi,ans=answered[key];
    html+=`<div class="q-card">
      <div class="q-num" style="color:${ch.color}">Question ${qi+1} of ${ch.qs.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-opts">
        ${q.o.map((opt,oi)=>{
          let cls='';
          if(ans!==undefined){if(oi===q.a)cls='correct';else if(oi===ans)cls='wrong';}
          return`<button class="q-opt ${cls}" ${ans!==undefined?'disabled':''} onclick="ansQ(${pqCh},${qi},${oi})">
            <span class="opt-letter">${'ABCD'[oi]}</span>${opt}
          </button>`;
        }).join('')}
      </div>
      <div class="q-exp ${ans!==undefined?'show':''}">
        <div class="exp-label">💡 Explanation</div>${q.e}
      </div>
    </div>`;
  });
  document.getElementById('pq-container').innerHTML=html;
  document.getElementById('pq-score').textContent=correct+' / '+total;
  document.getElementById('pq-correct').textContent=correct;
}
function ansQ(ci,qi,oi){
  const key=ci+'_'+qi;
  if(answered[key]!==undefined) return;
  answered[key]=oi;
  if(oi===DATA[ci].qs[qi].a) correct++;
  total++;
  renderPq();
}
function resetQuiz(){answered={};correct=0;total=0;renderPq();}

function selSa(i){saCh=i;activateBtn('sa',i);renderSa();}
function renderSa(){
  const ch=DATA[saCh];
  let html=`<div class="ch-title"><span class="ch-badge" style="background:${ch.light};color:${ch.dark}">${ch.emoji} Ch ${ch.id}</span> ${ch.title}</div>`;
  ch.sa.forEach((q,qi)=>{
    const key=saCh+'_'+qi;
    const rev=saRevealed[key];
    const hintKey=key+'_hint';
    const hintShown=saRevealed[hintKey];
    html+=`<div class="sa-card">
      <div class="sa-q-num" style="color:${ch.color}">
        Short Answer Q${qi+1}
        <span class="sa-marks">${q.marks} mark${q.marks>1?'s':''}</span>
      </div>
      <div class="sa-question">${q.q}</div>
      <textarea class="sa-textarea" id="sa-ta-${key}" placeholder="Write your answer here… 📝" rows="4"></textarea>
      <div class="sa-btn-row">
        <button class="sa-reveal-btn" onclick="toggleHint('${key}')"
          style="background:${ch.light};color:${ch.dark};border-color:${ch.color}">
          ${hintShown?'🙈 Hide Hint':'💡 Show Hint'}
        </button>
        <button class="sa-reveal-btn" onclick="revealAns('${key}')"
          style="background:${ch.color};color:#fff;border-color:${ch.dark}">
          ${rev?'✅ Hide Answer':'🔍 Reveal Answer'}
        </button>
      </div>
      <div class="sa-hint ${hintShown?'show':''}" id="sa-hint-${key}">
        <strong>💡 Hint:</strong> ${q.hint}
      </div>
      <div class="sa-answer ${rev?'show':''}" id="sa-ans-${key}"
        style="background:${ch.light};border-left:4px solid ${ch.color};color:${ch.dark}">
        <div class="sa-answer-label" style="color:${ch.color}">✅ Sample Answer (${q.marks} marks)</div>
        ${q.ans.replace(/\n/g,'<br>')}
      </div>
    </div>`;
  });
  document.getElementById('sa-container').innerHTML=html;
}
function revealAns(key){
  saRevealed[key]=!saRevealed[key];
  renderSa();
}
function toggleHint(key){
  const hintKey=key+'_hint';
  saRevealed[hintKey]=!saRevealed[hintKey];
  renderSa();
}

function selSum(i){sumCh=i;activateBtn('sum',i);renderSum();}
function renderSum(){
  const ch=DATA[sumCh];
  let html=`<div class="sum-card" style="border-top:5px solid ${ch.color}">
    <div class="sum-title" style="color:${ch.dark}">${ch.emoji} ${ch.title}</div>
    <div class="sum-body">${ch.sum}</div>
  </div>
  <div class="sum-card">
    <div class="ch-title" style="color:${ch.dark};font-size:15px">🃏 Key Terms — ${ch.cards.length} terms</div>
    <div class="term-grid">
      ${ch.cards.map(c=>`
        <div class="term-row" style="background:${ch.light};border-color:${ch.color}">
          <span class="term-name" style="color:${ch.dark}">${c.t}</span>
          <span style="font-size:12px;color:var(--muted)"> — </span>
          <span class="term-def">${c.d}</span>
        </div>
      `).join('')}
    </div>
  </div>`;
  document.getElementById('sum-content').innerHTML=html;
}

init();
</script>
</body>
</html>
